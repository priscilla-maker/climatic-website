<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkyPulse | Dispatch Terminal</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="nav-container">
            <a href="index.html" class="logo">🌦️ <span>SkyPulse</span></a>
            <nav>
                <a href="index.html" class="nav-btn">Home</a>
                <a href="about.html" class="nav-btn">About Us</a>
                <a href="history.html" class="nav-btn">History</a>
                <a href="solutions.html" class="nav-btn">Solutions</a>
                <a href="map.html" class="nav-btn">World Map</a>
                <a href="contact.html" class="nav-btn active">Contact Us</a>
            </nav>
            <div class="auth-zone"><a href="signin.html" class="nav-btn">Sign In</a></div>
        </div>
    </header>

    <main style="display: flex; justify-content: center; align-items: center; padding-top: 3rem;">
        <div class="panel-card" style="max-width: 500px; width: 100%; display: flex; flex-direction: column; gap: 1.5rem;">
            <div>
                <h1 style="font-size: 1.5rem; font-weight: 900;">Ping Technical Support</h1>
                <p style="color: var(--text-secondary); font-size: 0.8rem; margin-top: 0.25rem;">File a ticket directly into our infrastructure logging terminal room.</p>
            </div>
            
            <form action="index.html" onsubmit="alert('Message packet securely transmitted.'); return false;" style="display: flex; flex-direction: column; gap: 1rem;">
                <div style="display: flex; flex-direction: column; gap: 0.35rem;">
                    <label style="font-size: 0.65rem; text-transform: uppercase; font-weight: 700; color: var(--text-secondary);">Operator Name</label>
                    <input type="text" placeholder="Designation" required>
                </div>
                <div style="display: flex; flex-direction: column; gap: 0.35rem;">
                    <label style="font-size: 0.65rem; text-transform: uppercase; font-weight: 700; color: var(--text-secondary);">Urgency Level</label>
                    <select style="background: var(--bg-main); border: 1px solid var(--border-color); color: var(--text-primary); border-radius: 0.75rem; padding: 0.75rem 1rem; font-size: 0.875rem;">
                        <option>Operational Monitoring</option>
                        <option>Component Failure</option>
                        <option>Immediate Threat Analysis</option>
                    </select>
                </div>
                <div style="display: flex; flex-direction: column; gap: 0.35rem;">
                    <label style="font-size: 0.65rem; text-transform: uppercase; font-weight: 700; color: var(--text-secondary);">Transmission Log</label>
                    <textarea rows="4" placeholder="Detail your technical query..."></textarea>
                </div>
                <button type="submit" class="btn-action">Transmit Payload</button>
            </form>
        </div>
    </main>
</body>
</html>
