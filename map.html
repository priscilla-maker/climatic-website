<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkyPulse | Isobar Vector Mapping</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="nav-container">
            <a href="index.html" class="logo">🌦️ <span>SkyPulse</span></a>
            <nav>
                <a href="index.html" class="nav-btn">Home</a>
                <a href="about.html" class="nav-btn">About Us</a>
                <a href="history.html" class="nav-btn">History</a>
                <a href="solutions.html" class="nav-btn">Solutions</a>
                <a href="map.html" class="nav-btn active">World Map</a>
                <a href="contact.html" class="nav-btn">Contact Us</a>
            </nav>
            <div class="auth-zone"><a href="signin.html" class="nav-btn">Sign In</a></div>
        </div>
    </header>

    <main style="display: grid; grid-template-cols: 1fr; gap: 1rem; height: calc(100vh - 10rem);">
        <div class="panel-card" style="padding: 1rem; display: flex; flex-direction: column; gap: 1rem; position: relative;">
            <div style="display: flex; justify-content: space-between; align-items: center; z-index: 10;">
                <div>
                    <h1 style="font-size: 1.5rem; font-weight: 900;">Global Radar Overlay</h1>
                    <p style="color: var(--text-secondary); font-size: 0.75rem;">Active geostationary cloud density scan layer.</p>
                </div>
                <span style="font-size: 0.7rem; font-weight: 700; background: rgba(16,185,129,0.15); color: #10b981; border: 1px solid rgba(16,185,129,0.3); padding: 0.35rem 0.65rem; border-radius: 2rem;">Radar Node Online</span>
            </div>
            
            <div style="flex-grow: 1; border-radius: 1rem; overflow: hidden; border: 1px solid var(--border-color); position: relative; background: #000;">
                <!-- High-quality radar design map placeholder layout -->
                <iframe src="https://www.google.com/maps/embed?pb=.4634464,33.2475588,13z?entry=ttu&g_ep=EgoyMDI2MDYxNi4wIKXMDSoASAFQAw%3D%3D.com" alt="World Map Satellite Background View" style="width:100%; height:100%; object-fit:cover; opacity: 0.45; filter: hue-rotate(180deg) contrast(1.2);">
                    </iframe>
                <div style="position: absolute; bottom: 1rem; left: 1rem; right: 1rem; background: rgba(15,23,42,0.9); border: 1px solid var(--border-color); padding: 0.75rem; border-radius: 0.75rem; font-size: 0.75rem; text-align: center; color: var(--text-secondary);">
                    Telemetry Coordinates: <span style="color: white; font-weight: 600;">0.0000° N, 32.5825° E</span> | Update Interval: Real-Time Stream
                </div>
            </div>
        </div>
    </main>
</body>
</html>
