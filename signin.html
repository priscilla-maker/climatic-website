<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkyPulse | Secure Access</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main style="display: flex; justify-content: center; align-items: center; min-height: 100vh;">
        <div class="panel-card" style="max-width: 400px; width: 100%; text-align: center; display: flex; flex-direction: column; gap: 1.5rem;">
            <a href="index.html" class="logo" style="justify-content: center; font-size: 1.5rem;">🌦️ <span>SkyPulse</span></a>
            <div>
                <h1 style="font-size: 1.5rem; font-weight: 900;">Authorize Terminal Access</h1>
                <p style="color: var(--text-secondary); font-size: 0.8rem; margin-top: 0.25rem;">Enter your credentials to initiate secure data feed.</p>
            </div>
            
            <form action="index.html" style="display: flex; flex-direction: column; gap: 1rem;">
                <input type="email" placeholder="Operator Email" required>
                <input type="password" placeholder="Encryption Key" required>
                <button type="submit" class="btn-action">Log In</button>
            </form>
            <p style="font-size: 0.75rem; color: var(--text-secondary);">New to Skypulse? <a href="signup.html" style="color: var(--accent-blue);">Request credentials</a></p>
        </div>
    </main>
</body>
</html>
