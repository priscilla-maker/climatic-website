<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkyPulse | Provision New Account</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main style="display: flex; justify-content: center; align-items: center; min-height: 100vh;">
        <div class="panel-card" style="max-width: 400px; width: 100%; display: flex; flex-direction: column; gap: 1.5rem;">
            <a href="index.html" class="logo" style="justify-content: center; font-size: 1.5rem;">🌦️ <span>SkyPulse</span></a>
            <div>
                <h1 style="font-size: 1.5rem; font-weight: 900;">Provision New Terminal</h1>
                <p style="color: var(--text-secondary); font-size: 0.8rem; margin-top: 0.25rem;">Create a secure account to access atmospheric metrics.</p>
            </div>
            
            <form action="index.html" style="display: flex; flex-direction: column; gap: 1rem;">
                <input type="text" placeholder="Full Name" required>
                <input type="email" placeholder="Professional Email" required>
                <input type="password" placeholder="Create Secure Password" required>
                <button type="submit" class="btn-action">Provision Account</button>
            </form>
            <p style="font-size: 0.75rem; color: var(--text-secondary); text-align: center;">Already authorized? <a href="signin.html" style="color: var(--accent-blue);">Sign In</a></p>
        </div>
    </main>
</body>
</html>
